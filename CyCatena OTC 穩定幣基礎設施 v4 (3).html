  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

('.coin-entry'));\n    coins.forEach(function(coin,i){\n      var r=coin.getBoundingClientRect();\n      var cCX=r.left+20,cCY=r.top+20;\n      var dx=wCX-cCX,dy=wCY-cCY;\n      coin.style.transformOrigin=(20+dx)+'px '+(20+dy)+'px';\n      coin.style.opacity='0';\n      coin.style.transform='scale(0)';\n      setTimeout(function(){\n        coin.style.transition='opacity .4s ease,transform .65s cubic-bezier(0.34,1.56,0.64,1)';\n        coin.style.opacity='1';\n        coin.style.transform='scale(1)';\n        setTimeout(function(){\n          coin.style.transition='';\n          coin.style.transform='';\n          coin.style.transformOrigin='';\n          coin.style.animation='coinFloat '+floatDurations[i]+'s ease-in-out infinite';\n        },750);\n      },600+i*200);\n    });\n  }\n  if(document.readyState==='complete')run();\n  else window.addEventListener('load',run);\n})();\n<\u002Fscript>\n<script>\n/* ===== Vault SVG entrance — grow outward from center vault, on scroll ===== */\n(function(){\n  var svg=document.querySelector('.vault-svg-wrap svg');\n  if(!svg)return;\n  var CX=500, CY=138; // CyCatena Vault center (filter8)\n  var groups=Array.from(svg.querySelectorAll('g[filter]'));\n  var standalones=Array.from(svg.querySelectorAll('path,rect')).filter(function(el){\n    return !el.closest('g[filter]') && !el.closest('.flow-pulses');\n  });\n  var pulses=svg.querySelector('.flow-pulses');\n\n  function prepBox(el){\n    el.style.transformBox='view-box';\n    el.style.transformOrigin=CX+'px '+CY+'px';\n    el.style.opacity='0';\n    el.style.transform='scale(.12)';\n  }\n  groups.forEach(prepBox);\n  // connectors: grow 0→1 from the end nearest the centre vault (draw-out effect)\n  standalones.forEach(function(el){\n    el.style.transformBox='view-box';\n    var bb; try{bb=el.getBBox();}catch(e){bb={x:CX,y:CY,width:0,height:0};}\n    var corners=[[bb.x,bb.y],[bb.x+bb.width,bb.y],[bb.x,bb.y+bb.height],[bb.x+bb.width,bb.y+bb.height]];\n    var best=corners[0],bd=1e9;\n    corners.forEach(function(c){var d=Math.hypot(c[0]-CX,c[1]-CY); if(d<bd){bd=d;best=c;}});\n    el.style.transformOrigin=best[0]+'px '+best[1]+'px';\n    el.style.opacity='0';\n    el.style.transform='scale(0)';\n  });\n  if(pulses) pulses.style.opacity='0';\n\n  var centerG=svg.querySelector('g[filter=\"url(#filter8_d_1879_2384)\"]');\n  var boxes=[\n    {id:'filter1',x:498,y:26},{id:'filter2',x:498,y:251},{id:'filter0',x:285,y:56},\n    {id:'filter9',x:287,y:225},{id:'filter4',x:728,y:61},{id:'filter6',x:749,y:250},\n    {id:'filter7',x:886,y:139},{id:'filter5',x:140,y:280},{id:'filter3',x:91,y:135}\n  ];\n  function dist(x,y){return Math.hypot(x-CX,y-CY);}\n  boxes.sort(function(a,b){return dist(a.x,a.y)-dist(b.x,b.y);});\n  // group boxes into outward waves of 2\n  var waves=[];\n  for(var wi=0;wi<boxes.length;wi+=2){ waves.push(boxes.slice(wi,wi+2)); }\n  // assign each connector line to the wave of its nearest box\n  function nearestWave(cx,cy){\n    var best=0,bd=1e9;\n    waves.forEach(function(w,i){ w.forEach(function(b){ var d=Math.hypot(cx-b.x,cy-b.y); if(d<bd){bd=d;best=i;} }); });\n    return best;\n  }\n  var connWave=standalones.map(function(el){\n    var bb; try{bb=el.getBBox();}catch(e){bb={x:CX,y:CY,width:0,height:0};}\n    return nearestWave(bb.x+bb.width/2, bb.y+bb.height/2);\n  });\n\n  function reveal(el,delay){\n    setTimeout(function(){\n      el.style.transition='opacity .5s ease, transform .65s cubic-bezier(.22,1,.36,1)';\n      el.style.opacity='1'; el.style.transform='scale(1)';\n    },delay);\n  }\n\n  var WAVE=820; // ms per wave (line grows, then its boxes appear)\n  function animate(){\n    reveal(centerG,0);                       // CyCatena Vault first\n    waves.forEach(function(w,i){\n      var base=320 + i*WAVE;\n      standalones.forEach(function(el,k){ if(connWave[k]===i) reveal(el, base); });  // lines grow\n      w.forEach(function(b,bi){                                                       // then boxes\n        var g=svg.querySelector('g[filter=\"url(#'+b.id+'_d_1879_2384)\"]');\n        if(g) reveal(g, base+360+bi*90);\n      });\n    });\n    setTimeout(function(){ if(pulses){pulses.style.transition='opacity .6s ease';pulses.style.opacity='1';} }, 320+waves.length*WAVE+500);\n  }\n\n  if('IntersectionObserver' in window){\n    var obs=new IntersectionObserver(function(entries){\n      if(entries[0].isIntersecting){animate();obs.disconnect();}\n    },{threshold:0.25});\n    obs.observe(svg);\n  } else {\n    animate();\n  }\n})();\n<\u002Fscript>\n<script>\n/* ===== Scenarios entrance ===== */\n(function(){\n  var center=document.querySelector('#scenarios .center');\n  var cards=Array.from(document.querySelectorAll('#scenarios .uc-card'));\n  if(!center)return;\n  function reveal(){\n    center.classList.add('vis');\n    cards.forEach(function(card,i){\n      setTimeout(function(){card.classList.add('vis');},300+i*150);\n    });\n  }\n  var obs=new IntersectionObserver(function(entries){\n    if(entries[0].isIntersecting){reveal();obs.disconnect();}\n  },{threshold:0.5});\n  obs.observe(center);\n})();\n<\u002Fscript>\n<script>\n/* ===== Infrastructure cards entrance ===== */\n(function(){\n  var cards=Array.from(document.querySelectorAll('.infra-card'));\n  if(!cards.length)return;\n  function reveal(){\n    var center=document.querySelector('#infrastructure .center');\n    if(center)center.classList.add('vis');\n    cards.forEach(function(c,i){setTimeout(function(){c.classList.add('vis');},200+i*140);});\n  }\n  var obs=new IntersectionObserver(function(e){if(e[0].isIntersecting){reveal();obs.disconnect();}},{threshold:0.3});\n  obs.observe(document.querySelector('#infrastructure .infra-grid'));\n})();\n<\u002Fscript>\n<script>\n/* ===== Hero glass-art position control ===== */\n(function(){\n  var art=document.querySelector('.hero-glassart');\n  if(!art)return;\n  var rot=document.getElementById('gaRot'),x=document.getElementById('gaX'),\n      y=document.getElementById('gaY'),w=document.getElementById('gaW');\n  if(!rot)return;\n  var KEY='cyc_hero_art';\n  function apply(save){\n    art.style.setProperty('--ga-rot',(rot.value||0)+'deg');\n    art.style.setProperty('--ga-x',(x.value||0)+'%');\n    art.style.setProperty('--ga-y',(y.value||0)+'%');\n    art.style.setProperty('--ga-w',(w.value||40)+'%');\n    if(save)try{localStorage.setItem(KEY,JSON.stringify({r:rot.value,x:x.value,y:y.value,w:w.value}));}catch(e){}\n  }\n  try{var s=JSON.parse(localStorage.getItem(KEY)||'null');if(s){rot.value=s.r;x.value=s.x;y.value=s.y;w.value=s.w;}}catch(e){}\n  apply(false);\n  [rot,x,y,w].forEach(function(el){el.addEventListener('input',function(){apply(true);});});\n})();\n<\u002Fscript>\n\n<script>\n/* ===== Hub entrance: center+logo first, then nodes clockwise from top ===== */\n(function(){\n  var hub=document.querySelector('.rotate-band .hub');\n  if(!hub)return;\n  var nodes=[].slice.call(hub.querySelectorAll('.node'));\n  // order clockwise starting from top (銀行), using angle from center\n  var cx=400, cy=310;\n  nodes.forEach(function(n){\n    var x=parseFloat(n.style.left), y=parseFloat(n.style.top);\n    var ang=Math.atan2(y-cy, x-cx)*180/Math.PI; // -90 = top\n    ang=(ang+90+360)%360; // 0 at top, increasing clockwise\n    n.__ang=ang;\n  });\n  nodes.sort(function(a,b){return a.__ang-b.__ang;});\n  var CENTER_MS=650, STEP=220, START=520;\n  nodes.forEach(function(n,i){ n.style.transitionDelay=(START+i*STEP)+'ms'; });\n  var fired=false;\n  function go(){ if(fired)return; fired=true; hub.classList.add('go'); }\n  if('IntersectionObserver' in window){\n    var io=new IntersectionObserver(function(es){\n      es.forEach(function(e){ if(e.isIntersecting) go(); });\n    },{threshold:0, rootMargin:'-40% 0px -40% 0px'});\n    io.observe(hub);\n  } else { go(); }\n})();\n<\u002Fscript>\n<script>\n/* mobile menu toggle */\n(function(){\n  var nav=document.querySelector('.site-header .nav');\n  var btn=document.querySelector('.menu-toggle');\n  if(!nav||!btn)return;\n  btn.addEventListener('click',function(e){e.stopPropagation();nav.classList.toggle('open');});\n  nav.querySelectorAll('.nav-links a').forEach(function(a){a.addEventListener('click',function(){nav.classList.remove('open');});});\n  document.addEventListener('click',function(e){if(!nav.contains(e.target))nav.classList.remove('open');});\n})();\n<\u002Fscript>\n\n<\u002Fmain><\u002Fbody><\u002Fhtml>"
  </script>
